[flake8]
max-line-length = 120
extend-ignore =
    # Whitespace/alignment style
    E203, E221, E222, E225, E226, E231, E241, E242, E261, E262, E265, E272, E273,
    # Blank lines style
    E301, E302, E303, E304, E305, E306,
    # Import order
    E401, E402,
    # Line length (already handled by max-line-length)
    E501,
    # Statement style
    E701, E702, E703,
    # Comparison style (SQLAlchemy uses == True often)
    E711, E712,
    # Ambiguous variable names
    E741,
    # Trailing whitespace
    W191, W291, W293, W391,
    # Pyflakes: common false positives in SQLAlchemy/FastAPI codebases
    F401,
    F403,
    F811,
    F821,
    F841,
    F541,
