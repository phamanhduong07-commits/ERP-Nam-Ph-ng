name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt flake8

      - name: Lint (flake8)
        run: python -m flake8 backend/app --max-line-length=120

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: ci-test-secret-key-for-testing-purposes-only-abcdef1234
        run: pytest tests/ -v --tb=short
